<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IA para Arquitectos — Slides | Isthmus Norte</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="slides.css" />
  </head>
  <body>
    <!-- Day Navigation -->
    <nav id="day-nav" class="visible">
      <button class="day-dot active" data-day="1">
        <span class="day-dot-label">Día 1</span>
      </button>
      <button class="day-dot" data-day="2">
        <span class="day-dot-label">Día 2</span>
      </button>
      <button class="day-dot" data-day="3">
        <span class="day-dot-label">Día 3</span>
      </button>
      <button class="day-dot" data-day="4">
        <span class="day-dot-label">Día 4</span>
      </button>
      <button class="day-dot" data-day="5">
        <span class="day-dot-label">Día 5</span>
      </button>
      <button class="day-dot" data-day="6">
        <span class="day-dot-label">Día 6</span>
      </button>
      <button class="day-dot" data-day="7">
        <span class="day-dot-label">Día 7</span>
      </button>
      <button class="day-dot" data-day="8">
        <span class="day-dot-label">Día 8</span>
      </button>
      <button class="day-dot" data-day="9">
        <span class="day-dot-label">Día 9</span>
      </button>
      <button class="day-dot" data-day="10">
        <span class="day-dot-label">Día 10</span>
      </button>
    </nav>

    <!-- Slide Counter -->
    <div id="slide-counter">1/255</div>

    <!-- Progress Bar -->
    <div id="progress-bar" style="width: 0%"></div>

    <!-- Keyboard Hint -->
    <div id="keyboard-hint" class="visible">
      ← → navegar · F fullscreen · T timer · 1-0 días
    </div>

    <!-- Audio Toggle -->
    <button id="audio-toggle">🔇 Audio</button>

    <!-- Presentation Container -->
    <div id="presentation"></div>

    <script src="slides.js"></script>
  </body>
</html>
